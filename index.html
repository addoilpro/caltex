<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加德士 Caltex 精確成本計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f9fb; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .caltex-blue { color: #005696; }
        .caltex-bg-blue { background-color: #005696; }
        .caltex-red { color: #ed1c24; }
        .caltex-bg-red { background-color: #ed1c24; }
        .border-caltex-blue { border-color: #005696; }
        
        /* 官方導航線條裝飾 */
        .brand-line { height: 4px; background: linear-gradient(90deg, #ed1c24 0%, #ed1c24 50%, #005696 50%, #005696 100%); }
        
        .card-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .day-btn.active { border-color: #005696; background-color: #005696; color: white; font-weight: bold; }
        .fuel-btn.active { border-color: #ed1c24; background-color: #fff; box-shadow: 0 0 0 2px #ed1c24; }
        
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 50; }
        
        /* 模擬官網按鈕質感 */
        .btn-official { transition: all 0.2s ease-in-out; border-radius: 4px; }
        
        /* 結果面板 */
        .result-panel { background-color: #ffffff; border-top: 4px solid #005696; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600 mx-auto mb-4"></div>
            <p class="text-xs text-gray-500 font-bold tracking-widest uppercase">Loading Caltex Data...</p>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white overflow-hidden card-shadow rounded-lg">
        <!-- 官網風格頭部 (含官方 Logo) -->
        <div class="bg-white px-5 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <img src="https://www.caltex.com/content/dam/caltex/common/icon/corporate/caltex_logo.png" 
                     alt="Caltex Logo" 
                     class="h-10 w-auto object-contain"
                     onerror="this.onerror=null; this.outerHTML='<span class=\'text-xl font-bold italic caltex-blue\'>CALTEX</span>';">
            </div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-right">
                Smart<br>Calculator
            </div>
        </div>
        <div class="brand-line w-full"></div>

        <div class="p-6 space-y-6">
            <!-- 數據同步狀態 -->
            <div class="flex items-center justify-center">
                <span id="sync-status" class="text-[9px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-mono italic">正在連接雲端數據庫...</span>
            </div>

            <!-- 1. 日期選擇 -->
            <div>
                <label class="block text-gray-700 font-bold mb-3 text-sm">選擇今日星期</label>
                <div class="grid grid-cols-7 gap-1" id="day-picker">
                    <button onclick="updateSelection('day', 1)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="1">一</button>
                    <button onclick="updateSelection('day', 2)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="2">二</button>
                    <button onclick="updateSelection('day', 3)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="3">三</button>
                    <button onclick="updateSelection('day', 4)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="4">四</button>
                    <button onclick="updateSelection('day', 5)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="5">五</button>
                    <button onclick="updateSelection('day', 6)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="6">六</button>
                    <button onclick="updateSelection('day', 7)" class="day-btn py-2 btn-official border text-xs text-gray-500 bg-white" data-day="7">日</button>
                </div>
            </div>

            <!-- 2. 優惠方案 -->
            <div>
                <label class="block text-gray-700 font-bold mb-2 text-sm">選擇優惠方案</label>
                <div class="relative">
                    <select id="promo-select" class="w-full p-3 bg-white border border-gray-300 rounded-md outline-none text-sm font-medium text-gray-700 appearance-none focus:border-caltex-blue" onchange="calculate()">
                        <option value="">正在載入方案...</option>
                    </select>
                    <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 text-xs">▼</div>
                </div>
            </div>

            <!-- 3. 選擇油品 -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="updateSelection('fuel', 'super')" id="btn-super" class="fuel-btn border-2 rounded-md p-3 text-center relative overflow-hidden transition-all bg-white border-gray-200">
                    <div class="font-bold text-sm caltex-blue uppercase">Techron 白金</div>
                    <div class="text-xs font-bold text-gray-400 mt-1" id="price-super">$32.89</div>
                    <div id="tag-upgrade" class="hidden absolute top-0 right-0 caltex-bg-red text-white text-[8px] px-2 py-0.5 font-bold">免費升級</div>
                </button>
                <button onclick="updateSelection('fuel', 'regular')" id="btn-regular" class="fuel-btn border-2 rounded-md p-3 text-center transition-all bg-white border-gray-200">
                    <div class="font-bold text-sm text-gray-700 uppercase">Techron 黃金</div>
                    <div class="text-xs font-bold text-gray-400 mt-1" id="price-regular">$31.09</div>
                </button>
            </div>

            <!-- 4. 付款金額 -->
            <div>
                <label class="block text-gray-700 font-bold mb-2 text-sm">名義入油金額 (油錶跳動目標)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold text-gray-400">$</span>
                    <input type="number" id="pay-amount" value="350" class="w-full pl-10 pr-4 py-4 border border-gray-300 rounded-md outline-none focus:border-caltex-blue text-3xl font-bold text-gray-800" oninput="calculate()">
                </div>
                <div id="coupon-hint" class="mt-3 flex justify-between items-center bg-gray-50 p-3 rounded-md border border-gray-200">
                    <span class="text-[11px] text-gray-500">疊加邏輯: 每滿 <span id="hint-min-spend" class="font-bold">$0</span> 送 <span id="hint-disc-lump" class="font-bold">$0</span></span>
                    <span class="text-[11px] font-black caltex-blue" id="hint-coupon-count">已使用 1 張券</span>
                </div>
            </div>

            <!-- 結果卡片 -->
            <div class="result-panel p-6 shadow-inner rounded-b-lg space-y-5 bg-gray-50">
                <div class="flex justify-between items-end border-b border-gray-200 pb-4">
                    <div class="text-gray-500 text-[11px] font-bold uppercase tracking-widest">應付現金 (已扣折扣)</div>
                    <div class="text-4xl font-black caltex-red font-mono" id="res-actual-pay">$0.00</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="text-gray-400 text-[10px] font-bold mb-1 uppercase">實付淨價 / L</div>
                        <div class="text-xl font-bold caltex-blue font-mono" id="res-direct">$0.00</div>
                    </div>
                    <div class="text-right">
                        <div class="text-gray-400 text-[10px] font-bold mb-1 uppercase">連積分淨價 / L</div>
                        <div class="text-xl font-bold text-gray-800 font-mono" id="res-points">$0.00</div>
                    </div>
                </div>

                <div class="space-y-2 pt-4 border-t border-dashed border-gray-300">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-500">油錶跳動目標:</span>
                        <span class="font-bold text-gray-800" id="res-meter">$0.00</span>
                    </div>
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-500">總獲油量 (Total Liters):</span>
                        <span class="font-bold caltex-blue" id="res-total-liters">0.000 L</span>
                    </div>
                    <div class="flex justify-between text-[11px] text-gray-400">
                        <span>贈送油量 (<span id="res-coupon-qty">0</span> 張券):</span>
                        <span id="res-free-liters">0.000 L</span>
                    </div>
                    <div class="flex justify-between text-[11px] text-gray-400">
                        <span>獲得積分 (僅計實付):</span>
                        <span class="font-medium" id="res-pts">0 pts</span>
                    </div>
                </div>
            </div>

            <div class="text-[10px] text-gray-400 text-center leading-relaxed italic" id="res-remarks">
                備註: 正在讀取數據...
            </div>
        </div>
    </div>

    <!-- 頁腳裝飾 -->
    <div class="max-w-md mx-auto mt-6 text-center">
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">© Caltex Hong Kong - Smart Calculator Tool</p>
    </div>

    <script>
        const COL_FUEL_NAME = 1;  
        const COL_LIST_PRICE = 2; 
        const COL_PROMO_NAME = 3; 
        const COL_DAYS = 5;       
        const COL_FUEL_TARGET = 6;
        const COL_DISC_LITER = 7; 
        const COL_DISC_LUMP = 8;  
        const COL_PTS_MULT = 9;   
        const COL_UPGRADE = 10;   
        const COL_MIN_SPEND = 11; 
        const COL_REMARKS = 12;   

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWqLgHf9e8GyoDwCDxY15GY19TvKS0mIo4MXlaYb6pdvJrGm3wxgYsiORXX3vkgWuWjUasZ17X_Cqa/pub?gid=2119631317&single=true&output=csv";

        let promoRules = [];
        let gasPrices = { "super": 32.89, "regular": 31.09 };
        let state = { day: new Date().getDay() || 7, fuel: 'super' };

        async function init() {
            try {
                const response = await fetch(CSV_URL, { cache: 'no-cache' });
                const csv = await response.text();
                processData(csv);
                document.getElementById('sync-status').innerText = "雲端數據已同步";
            } catch (err) {
                const status = document.getElementById('sync-status');
                if (status) status.innerText = "連線失敗";
            } finally {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
                updateSelection('day', state.day);
            }
        }

        function processData(csv) {
            const lines = csv.split(/\r?\n/);
            lines.forEach((line, index) => {
                if (!line.trim() || index === 0) return;
                const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.trim().replace(/^"|"$/g, ''));

                if (row[COL_FUEL_NAME]) {
                    const price = parseFloat(row[COL_LIST_PRICE]);
                    if (!isNaN(price)) {
                        if (row[COL_FUEL_NAME].includes('白金')) gasPrices['super'] = price;
                        if (row[COL_FUEL_NAME].includes('黃金')) gasPrices['regular'] = price;
                    }
                }

                if (row[COL_PROMO_NAME]) {
                    promoRules.push({
                        name: row[COL_PROMO_NAME],
                        days: row[COL_DAYS],
                        targetFuel: row[COL_FUEL_TARGET].toLowerCase(),
                        discLiter: parseFloat(row[COL_DISC_LITER]) || 0,
                        discLump: parseFloat(row[COL_DISC_LUMP]) || 0,
                        ptsTimes: parseFloat(row[COL_PTS_MULT]) || 0,
                        upgrade: parseInt(row[COL_UPGRADE]) || 0,
                        minSpend: parseFloat(row[COL_MIN_SPEND]) || 0,
                        remarks: row[COL_REMARKS] || ""
                    });
                }
            });
            updatePricesUI();
        }

        function updatePricesUI() {
            const superPriceEl = document.getElementById('price-super');
            const regularPriceEl = document.getElementById('price-regular');
            if (superPriceEl) superPriceEl.innerText = `$${gasPrices['super'].toFixed(2)}`;
            if (regularPriceEl) regularPriceEl.innerText = `$${gasPrices['regular'].toFixed(2)}`;
        }

        function updateSelection(type, val) {
            state[type] = val;
            if (type === 'day') {
                document.querySelectorAll('.day-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.day) === val));
                populatePromos();
            }
            if (type === 'fuel') {
                const superBtn = document.getElementById('btn-super');
                const regularBtn = document.getElementById('btn-regular');
                if (superBtn) superBtn.classList.toggle('active', val === 'super');
                if (regularBtn) regularBtn.classList.toggle('active', val === 'regular');
            }
            calculate();
        }

        function populatePromos() {
            const select = document.getElementById('promo-select');
            if (!select) return;
            const dayStr = state.day.toString();
            const available = promoRules.filter(r => r.days.split(/[,，]/).includes(dayStr));
            const names = [...new Set(available.map(r => r.name))];
            select.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('') || `<option value="">無適用方案</option>`;
        }

        function calculate() {
            const payAmountInput = document.getElementById('pay-amount');
            const nominalAmount = payAmountInput ? parseFloat(payAmountInput.value) || 0 : 0;
            const promoSelect = document.getElementById('promo-select');
            const promoName = promoSelect ? promoSelect.value : "";
            if (!promoName) return;

            const dayStr = state.day.toString();
            let rule = promoRules.find(r => r.name === promoName && r.days.split(/[,，]/).includes(dayStr) && (r.targetFuel.includes(state.fuel) || r.targetFuel === ""));
            if (!rule) rule = promoRules.find(r => r.name === promoName);
            if (!rule) return;

            const couponQty = rule.minSpend > 0 ? Math.floor(nominalAmount / rule.minSpend) : (rule.discLump > 0 ? 1 : 0);
            const totalFreeMoney = couponQty * rule.discLump;
            
            const setSafeText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text;
            };

            setSafeText('hint-min-spend', `$${rule.minSpend}`);
            setSafeText('hint-disc-lump', `$${rule.discLump}`);
            setSafeText('hint-coupon-count', `已使用 ${couponQty} 張券`);
            setSafeText('res-coupon-qty', couponQty);

            const listPrice = gasPrices[state.fuel];
            const isUpgrade = rule.upgrade === 1 && state.fuel === 'super';
            const settlementPrice = isUpgrade ? gasPrices['regular'] : listPrice;
            
            const tagUpgrade = document.getElementById('tag-upgrade');
            if (tagUpgrade) tagUpgrade.classList.toggle('hidden', !isUpgrade);

            const cashPartValue = nominalAmount - totalFreeMoney; 
            const freeLiters = totalFreeMoney / listPrice;
            const payLiters = cashPartValue / listPrice;
            const totalLiters = freeLiters + payLiters;
            
            const payPerLiter = settlementPrice - rule.discLiter;
            const actualCashPay = payLiters * payPerLiter; 

            const ptsBase = state.fuel === 'super' ? 1.0 : 0.5;
            const ptsTotal = payLiters * ptsBase * rule.ptsTimes; 
            const extraLitersFromPts = ptsTotal / gasPrices['regular'];

            setSafeText('res-meter', `$${nominalAmount.toFixed(2)}`);
            setSafeText('res-actual-pay', `$${actualCashPay.toFixed(2)}`);
            setSafeText('res-free-liters', `${freeLiters.toFixed(3)} L`);
            setSafeText('res-total-liters', `${totalLiters.toFixed(3)} L`);
            setSafeText('res-direct', `$${totalLiters > 0 ? (actualCashPay / totalLiters).toFixed(3) : "0.000"}`);
            setSafeText('res-points', `$${(totalLiters + extraLitersFromPts) > 0 ? (actualCashPay / (totalLiters + extraLitersFromPts)).toFixed(3) : "0.000"}`);
            setSafeText('res-pts', `${ptsTotal.toFixed(1)} pts`);
            setSafeText('res-remarks', `備註: ${rule.remarks}`);
        }

        init();
    </script>
</body>
</html>
